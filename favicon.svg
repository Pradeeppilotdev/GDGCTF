<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#f0f0f0" rx="8"/>
  
  <!-- GDG Logo: 4 colored squares -->
